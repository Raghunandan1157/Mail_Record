<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Assistant — Mail Record</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #111827; height: 100vh; display: flex; flex-direction: column; }
  header { background: #6c63ff; color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  header h1 { font-size: 1.15rem; font-weight: 600; }
  header a { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 6px 14px; border: 1px solid rgba(255,255,255,0.5); border-radius: 6px; }
  header a:hover { background: rgba(255,255,255,0.15); }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; max-width: 800px; width: 100%; margin: 0 auto; }
  .msg { padding: 12px 16px; border-radius: 10px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: #6c63ff; color: #fff; align-self: flex-end; }
  .msg.assistant { background: #fff; color: #111827; align-self: flex-start; border: 1px solid #e5e7eb; }
  .msg.error { background: #fee2e2; color: #991b1b; align-self: stretch; text-align: center; font-size: 0.9rem; }
  .empty { text-align: center; color: #6b7280; margin-top: 60px; }
  .empty h2 { font-size: 1.4rem; margin-bottom: 12px; color: #374151; }
  .empty p { font-size: 0.95rem; margin-bottom: 24px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin: 0 auto; }
  .chip { background: #fff; border: 1px solid #d1d5db; padding: 8px 14px; border-radius: 18px; font-size: 0.85rem; cursor: pointer; color: #374151; }
  .chip:hover { background: #6c63ff; color: #fff; border-color: #6c63ff; }
  #composer { padding: 14px 20px; background: #fff; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; max-width: 800px; width: 100%; margin: 0 auto; }
  #input { flex: 1; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; font-family: inherit; resize: none; outline: none; }
  #input:focus { border-color: #6c63ff; }
  #send { background: #6c63ff; color: #fff; border: none; padding: 0 22px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
  #send:hover:not(:disabled) { background: #5a52d5; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  .typing { color: #6b7280; font-style: italic; align-self: flex-start; }
  .msg strong { font-weight: 700; }
  .msg em { font-style: italic; }
  .msg code { background: rgba(0,0,0,0.08); padding: 2px 6px; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; font-size: 0.88em; }
  .msg.user code { background: rgba(255,255,255,0.2); }
  .msg ul { padding-left: 22px; margin: 6px 0; }
  .msg li { margin: 3px 0; }
</style>
</head>
<body>
<header>
  <h1>AI Assistant</h1>
  <a href="index.html">← Back</a>
</header>

<div id="chat">
  <div class="empty" id="empty">
    <h2>Ask anything about your data</h2>
    <p>Complaints, mail, stock, employees — all in one place.</p>
    <div class="chips">
      <div class="chip" onclick="quickAsk(this)">Pending complaints summary</div>
      <div class="chip" onclick="quickAsk(this)">Mail volume by branch</div>
      <div class="chip" onclick="quickAsk(this)">Low stock items</div>
      <div class="chip" onclick="quickAsk(this)">Total employees per branch</div>
    </div>
  </div>
</div>

<div id="composer">
  <textarea id="input" rows="1" placeholder="Ask a question..."></textarea>
  <button id="send" onclick="send.click()">Send</button>
</div>

<script>
  // Access control: AI Assistant is restricted to Admin context only.
  const otp = sessionStorage.getItem('ai_otp') || localStorage.getItem('ai_otp');
  const isAdminFlag = (sessionStorage.getItem('sr_headoffice') || localStorage.getItem('sr_headoffice')) === 'true';
  const viewMode = sessionStorage.getItem('sr_view_mode') || localStorage.getItem('sr_view_mode') || 'admin';
  if (!otp || !isAdminFlag) {
    alert('Login required. Redirecting...');
    window.location.href = 'index.html';
  } else if (viewMode === 'branch') {
    alert('AI Assistant is unavailable in Head Office view. Returning to home.');
    window.location.href = 'index.html';
  }

  // Tab key: flip view + redirect to home
  let vswInProgress = false;
  function vswShow(toMode, ms) {
    let ov = document.getElementById('vswOverlay');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'vswOverlay';
      ov.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;';
      ov.innerHTML = `
        <div id="vswBg" style="position:absolute;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b 50%,#1d4ed8);opacity:0;transition:opacity .5s;"></div>
        <div id="vswCard" style="position:relative;text-align:center;opacity:0;transform:scale(.9);transition:all .5s;">
          <div style="display:inline-flex;align-items:center;justify-content:center;margin-bottom:24px;">
            <div style="width:80px;height:80px;border-radius:50%;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;animation:vswSpin 1s linear infinite;"></div>
          </div>
          <div style="font-size:11px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:8px;">Switching context</div>
          <h2 id="vswTitle" style="font-size:32px;font-weight:700;color:#fff;margin:0 0 12px;"></h2>
          <p id="vswSub" style="font-size:14px;color:rgba(255,255,255,.7);max-width:400px;margin:0 auto;"></p>
          <div style="margin-top:32px;width:256px;height:4px;background:rgba(255,255,255,.1);border-radius:9999px;overflow:hidden;margin-left:auto;margin-right:auto;">
            <div id="vswBar" style="height:100%;background:#fff;width:0;border-radius:9999px;"></div>
          </div>
        </div>`;
      document.body.appendChild(ov);
      const style = document.createElement('style');
      style.textContent = '@keyframes vswSpin{to{transform:rotate(360deg);}}';
      document.head.appendChild(style);
    }
    const title = document.getElementById('vswTitle');
    const sub = document.getElementById('vswSub');
    const bg = document.getElementById('vswBg');
    const card = document.getElementById('vswCard');
    const bar = document.getElementById('vswBar');
    if (toMode === 'admin') { title.textContent = 'Entering Admin View'; sub.textContent = 'Returning to Head Office home...'; }
    else { title.textContent = 'Entering Head Office View'; sub.textContent = 'AI Assistant disabled in this view. Returning home...'; }
    bar.style.transition = 'none'; bar.style.width = '0%';
    requestAnimationFrame(() => {
      bg.style.opacity = '1'; card.style.opacity = '1'; card.style.transform = 'scale(1)';
      requestAnimationFrame(() => { bar.style.transition = `width ${ms}ms linear`; bar.style.width = '100%'; });
    });
  }
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Tab') return;
    if (!isAdminFlag) return;
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (e.target && e.target.isContentEditable)) return;
    if (vswInProgress) { e.preventDefault(); return; }
    e.preventDefault();
    vswInProgress = true;
    const cur = sessionStorage.getItem('sr_view_mode') || localStorage.getItem('sr_view_mode') || 'admin';
    const next = cur === 'admin' ? 'branch' : 'admin';
    sessionStorage.setItem('sr_view_mode', next);
    localStorage.setItem('sr_view_mode', next);
    vswShow(next, 3000);
    // AI is admin-only — always redirect to home
    setTimeout(() => { window.location.href = 'index.html'; }, 3000);
  });

  const chat = document.getElementById('chat');
  let empty = document.getElementById('empty');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const messages = [];

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function renderMd(text) {
    let h = escapeHtml(text);
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
    h = h.replace(/(^|\n)[*\-] (.+)/g, '$1<li>$2</li>');
    h = h.replace(/(<li>.*?<\/li>(\n|$))+/gs, m => '<ul>' + m.replace(/\n/g, '') + '</ul>');
    return h;
  }

  function addMsg(role, content) {
    if (empty) { empty.remove(); empty = null; }
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = role === 'assistant' ? renderMd(content) : escapeHtml(content);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addError(text) {
    if (empty) { empty.remove(); empty = null; }
    const div = document.createElement('div');
    div.className = 'msg error';
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg assistant typing';
    div.textContent = 'Thinking...';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function quickAsk(el) {
    input.value = el.textContent;
    send.click();
  }

  async function doSend(text) {
    messages.push({ role: 'user', content: text });
    addMsg('user', text);
    const typing = addTyping();
    send.disabled = true;
    try {
      const res = await fetch('/api/ai-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ otp, messages })
      });
      const data = await res.json();
      typing.remove();
      if (!res.ok) {
        addError((data.error || 'Error') + (data.detail ? ': ' + data.detail : ''));
        messages.pop();
        return;
      }
      const reply = data.reply || '(empty reply)';
      messages.push({ role: 'assistant', content: reply });
      addMsg('assistant', reply);
    } catch (err) {
      typing.remove();
      addError('Network error: ' + err.message);
      messages.pop();
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  send.onclick = () => {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    doSend(text);
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send.click();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.focus();
</script>
</body>
</html>
